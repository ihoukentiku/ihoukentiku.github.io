<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>レイヤーペイントツール｜違法建築のTRPG便利ツール</title>
        <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Mochiy+Pop+P+One&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP&family=Shippori+Antique&display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
        <script src="https://cdn.jsdelivr.net/npm/fabric@latest/dist/index.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/monolith.min.css" />
        <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script> -->
        <style>
            html,
            body {
                height: 100%;
                margin: 0;
                padding: 0;
            }
            body {
                font-family: "Noto Sans JP", sans-serif;
                background-color: #b5b6b9;
                color: #333;
            }
            h1 {
                background-color: #f7f8fa;
                font-size: 28px;
                padding-bottom: 5px;
                padding-top: 5px;
                padding-left: 16px;
                z-index: 98;
                margin: 0;
            }
            .main {
                display: flex;
                height: calc(100% - 50px);
            }

            .tub {
                display: flex;
                flex-direction: column;
                width: 50px;
                background-color: #448ad4;
                position: sticky;
                top: 0;
                z-index: 5;
            }
            .tub > button {
                background-color: #448ad4;
                color: white;
                border: none;
                padding: 8px;
                border-radius: 10px;
                margin: 0;
                cursor: pointer;
                width: 100%;
                height: 50px;
                text-align: center;
                font-size: 24px;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .tub > button.active {
                background-color: white;
                color: #333;
                border-radius: 8px 0 0 8px;
                position: relative;
                z-index: 2;
                margin-bottom: -1px;
                font-weight: bold;
            }
            .section {
                background: white;
                padding: 15px;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
                z-index: 2;
                width: 250px;
                transform: translateX(0);
                transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out;
                padding-left: 15px;
                padding-right: 15px;
                overflow-y: auto;
            }
            .section.collapsed {
                transform: translateX(-100%);
                opacity: 0;
            }
            .settings-group {
                display: none;
                flex-direction: column;
                row-gap: 16px;
                overflow-y: auto;
            }
            .settings-group > div {
                display: flex;
                flex-direction: column;
                row-gap: 16px;
                border-bottom: 1px dashed #888;
                padding-bottom: 16px;
            }
            .settings-group > div:last-child {
                border-bottom: none;
            }
            .settings-group h4 {
                margin: 0;
                font-size: 18px;
            }
            .settings {
                display: none;
            }

            label {
                font-weight: bold;
                align-items: center;
                display: flex;
            }
            input {
                vertical-align: middle;
                box-sizing: border-box;
            }
            input[type="text"],
            input[type="number"],
            select {
                border-radius: 4px;
                font-size: 18px;
                padding: 0px 4px 0px 4px;
                height: 30px;
            }
            input[type="number"] {
                border: 1px solid #888;
                width: 50px;
            }
            input[type="color"] {
                height: 30px;
                border: none;
                border-radius: 4px;
                padding: 0;
            }
            input[type="range"] {
                -webkit-appearance: none;
                appearance: none;
                width: calc(100% - 60px);
                height: 30px;
                border-radius: 4px 0 0 4px;
                background: linear-gradient(90deg, #448ad4 100%, #dddddd 100%);
                cursor: pointer;
                position: absolute;
                top: 0;
                left: 0;
                margin: 0;
            }
            input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                appearance: none;
                width: 0px;
                height: 0px;
                border: none;
                box-shadow: none;
            }
            input[type="checkbox"] {
                width: 20px;
                height: 20px;
            }
            select {
                width: 100px;
            }
            button {
                background-color: #448ad4;
                color: white;
                box-sizing: border-box;
                padding: 6px 12px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                font-weight: bold;
            }
            button:hover,
            button:hover.nonactive,
            .tub > button:hover {
                background-color: #3d7bcd;
            }
            button.nonactive {
                background-color: #ffffff;
                border: 1px solid #888;
                color: black;
            }
            .opacity-control span {
                margin-left: 5px;
                font-weight: bold;
                display: inline-block;
                min-width: 2em;
                text-align: right;
            }
            .range-container {
                position: relative; /* 子要素の絶対位置指定の基準 */
                width: 100%; /* 親要素の幅に合わせる */
                max-width: 500px; /* 最大幅を設定 */
                height: 30px; /* レンジの高さを設定 */
            }
            .range-name-label {
                position: absolute; /* コンテナ内で絶対位置指定 */
                top: 0;
                left: 10px; /* 左端に配置 */
                height: 30px; /* 高さを設定 */
                z-index: 5; /* レンジ入力より手前に表示 */
                display: flex; /* Flexboxを使って中央揃え */
                align-items: center; /* 垂直方向中央揃え */
                color: white; /* テキストの色 */
                font-weight: bold; /* フォントを太くする */
                pointer-events: none; /* クリックイベントを透過させる */
                font-size: 0.9rem; /* フォントサイズ */
            }
            .number-input {
                position: absolute; /* コンテナ内で絶対位置指定 */
                top: 0;
                right: 0px; /* 右端に配置 */
                width: 80px; /* ナンバー入力の固定幅 */
                height: 30px; /* 高さをレンジと合わせる */
                /*padding: 0 4px; /* 内側の余白 */
                text-align: center; /* テキストを中央揃え */
                z-index: 0; /* レンジ入力より手前に表示し、クリック可能にする */
                background-color: none; /* 少し透明度のある白で、下のトラックが見えるように */
            }

            .canvas-wrapper {
                border: none;
                overflow: hidden;
                flex-grow: 1;
                display: flex;
                position: absolute;
                top: 50px;
                left: 50px;
                height: calc(100% - 50px);
                width: calc(100% - 50px);
            }
            #mainCanvas {
                z-index: 0;
                /* background-color: #fff;
                background-image: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%), linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%);
                background-size: 20px 20px;
                background-position: 0 0, 10px 10px;
                background-repeat: repeat; */
                height: 100%;
                width: 100%;
            }
            #toggleSettingsButton {
                background-color: #448ad4;
                color: white;
                border: none;
                padding: 8px;
                border-radius: 10px;
                margin: 0;
                cursor: pointer;
                width: 100%;
                height: 50px;
                text-align: center;
                font-size: 24px;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            #toggleSettingsButton:hover {
                background-color: #3d7bcd;
            }

            .material-symbols-outlined {
                font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
            }

            #layerSettings {
                width: 280px;
                position: absolute;
                top: 50px;
                right: 0;
                display: flex;
                flex-direction: column;
                row-gap: 16px;
                background: white;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
                z-index: 1;
                transform: translateX(0);
                transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out;
                padding-left: 15px;
                padding-right: 15px;
                overflow-y: auto;
                height: calc(100% - 50px);
            }
            .layer-item span {
                cursor: default;
            }
            .layer-item input[type="range"] {
                width: 80px;
            }
            .layer-item button {
                padding: 3px 6px;
                font-size: 0.8em;
            }
            .layer-controls button {
                margin-top: 10px;
            }
            #layerListContainer {
                flex-grow: 1;
                overflow-y: auto;
            }
            .layer-item {
                display: flex;
                align-items: center;
                border: 1px solid #ddd;
                border-radius: 4px;
                background-color: #f9f9f9;
                cursor: pointer;
                padding-left: 5px;
            }
            .layer-item.selected {
                background-color: #e0e8f0;
                border-color: #448ad4;
            }
            .layer-item .layer-visibility-toggle {
                cursor: pointer;
            }
            .layer-item .layer-name {
                flex-grow: 1;
                margin-right: 8px;
                margin-left: 8px;
                align-items: center;
                line-height: 27px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .layer-item .layer-actions button {
                margin-left: 4px;
            }
            .layer-controls button {
                width: 100%;
                margin-bottom: 5px;
            }
            .layer-controls {
                display: flex;
                flex-direction: column;
                margin-top: auto; /* 下部に固定 */
                padding-top: 10px;
                border-top: 1px solid #eee;
            }
            .layer-item.selected {
                background-color: #e0e8f0;
                border-color: #448ad4;
            }
            .layer-item[draggable="true"] {
                cursor: grab;
            }
            .layer-item:active[draggable="true"] {
                cursor: grabbing;
            }
            .layer-item.drop-target-before {
                border-top: 2px dashed blue;
            }
            .layer-item.drop-target-after {
                border-bottom: 2px dashed blue;
            }
        </style>
    </head>
    <body>
        <div style="position: relative">
            <h1>レイヤーペイントツール</h1>
            <a href="https://ihoukentiku.github.io" target="_blank" style="position: absolute; bottom: 3px; left: 600px">
                <button style="padding: 6px 12px">ホームページへ</button>
            </a>
        </div>
        <div class="main">
            <div class="tub">
                <button id="toggleSettingsButton" title="設定パネルを開閉">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <button id="canvasConfigModeButton" onclick="setMode('canvasConfig')" class="active" title="キャンパス設定">
                    <span class="material-symbols-outlined">settings</span>
                </button>
                <button id="selectModeButton" onclick="setMode('select')" title="選択モード">
                    <span class="material-symbols-outlined">arrow_selector_tool</span>
                </button>
                <button id="cellModeButton" onclick="setMode('cell')" title="マス目モード">
                    <span class="material-symbols-outlined">Grid_on</span>
                </button>
                <button id="lineModeButton" onclick="setMode('line')" title="線モード">
                    <span class="material-symbols-outlined">Straighten</span>
                </button>
                <button id="pathModeButton" onclick="setMode('path')" title="パスモード">
                    <span class="material-symbols-outlined">Polyline</span>
                </button>
                <button id="textModeButton" onclick="setMode('text')" title="テキストモード">
                    <span class="material-symbols-outlined">text_fields</span>
                </button>
                <button id="imageModeButton" onclick="setMode('image')" title="画像モード">
                    <span class="material-symbols-outlined">image</span>
                </button>
                <button id="downModeButton" onclick="setMode('down')" title="ダウンロード">
                    <span class="material-symbols-outlined">download</span>
                </button>
            </div>
            <div class="section">
                <div class="settings-group" id="canvasConfigSettings" style="display: flex">
                    <div>
                        <h4>グリッド設定</h4>
                        <label
                            >1マスのサイズ
                            <input style="width: 70px" type="number" id="cellSizeInput" value="100" min="1" />
                            px</label
                        >
                        <label
                            >マス数
                            <input type="number" id="colsInput" value="20" min="1" />
                            x
                            <input type="number" id="rowsInput" value="15" min="1"
                        /></label>
                        <label
                            >グリッド線の太さ
                            <input type="number" id="gridLineWidthInput" value="2" min="1" />
                            px</label
                        >
                        <label>
                            グリッド線の色
                            <div class="color-picker" id="gridColor"></div>
                        </label>
                        <div class="range-container">
                            <input type="range" id="gridOpacityInput" min="0" max="1" step="0.01" value="1" />
                            <label class="range-name-label">不透明度</label>
                            <input type="number" id="gridOpacityValueNumber" class="number-input" min="0" max="100" value="100" style="width: 60px; border-radius: 0 4px 4px 0" />
                        </div>
                    </div>
                    <div>
                        <h4>座標設定</h4>
                        <label>座標を表示<input type="checkbox" id="showCoordinatesCheckInput" /></label>
                        <label
                            >座標の色
                            <div class="color-picker" id="coordColor"></div
                        ></label>
                        <label
                            >サイズ
                            <input type="number" id="coordFontSizeInput" value="24" min="1" />
                            px</label
                        >
                        <div class="range-container">
                            <input type="range" id="coordOpacityInput" min="0" max="1" step="0.01" value="1" />
                            <label class="range-name-label">不透明度</label>
                            <input type="number" id="coordOpacityValueNumber" class="number-input" min="0" max="100" value="100" style="width: 60px; border-radius: 0 4px 4px 0" />
                        </div>
                        <label
                            >位置
                            <select id="coordPositionSelect" style="font-size: 15px">
                                <option value="top">上</option>
                                <option value="middle" selected>中央</option>
                                <option value="bottom">下</option>
                            </select>
                        </label>
                    </div>
                    <div>
                        <h4>背景設定</h4>
                        <label>背景色 <input type="color" id="solidBgColorInput" value="#FFFFFF" /></label>
                        <div class="range-container">
                            <input type="range" id="solidBgColorOpacityInput" min="0" max="1" step="0.01" value="1" />
                            <label class="range-name-label">不透明度</label>
                            <input type="number" id="solidBgColorOpacityValueNumber" class="number-input" min="0" max="100" value="100" style="width: 60px; border-radius: 0 4px 4px 0" />
                        </div>
                    </div>
                </div>
                <div class="settings-group" id="drowSettings">
                    <div class="settings" id="cellSettings">
                        <button id="cellToolButton" onclick="setTool('cell')">ペン</button>
                        <button id="eraserToolButton" onclick="setTool('eraser')" class="nonactive">消しゴム</button>
                    </div>

                    <div class="settings" id="lineSettings">
                        <label>スナップ <input type="checkbox" id="snapCheckLineInput" checked /></label>
                    </div>

                    <div class="settings" id="pathSettings">
                        <label>スナップ <input type="checkbox" id="snapCheckPathInput" checked /></label>
                    </div>

                    <div class="settings" id="textSettings">
                        <label
                            >フォント
                            <select id="fontSelect">
                                <option value="'Noto Sans JP', sans-serif">Noto Sans JP</option>
                                <option value="'Noto Serif JP', serif">Noto Serif JP</option>
                                <option value="'Shippori Antique', sans-serif">しっぽりアンティーク</option>
                                <option value="'DotGothic16', sans-serif">DotGothic16</option>
                                <option value="'Mochiy Pop P One', sans-serif">Mochiy Pop P One</option>
                            </select>
                        </label>
                        <label
                            >サイズ
                            <input type="number" id="fontSizeInput" value="80" min="0" max="1000" />
                            px</label
                        >
                        <input id="textInput" type="text" placeholder="追加する文字を入力" />
                        <button id="textAddButton" onclick="addText()">追加</button>
                    </div>

                    <div>
                        <h4>フィル設定</h4>
                        <label>フィル色 <input type="color" id="fillColorInput" value="#888888" /></label>
                        <div class="range-container">
                            <input type="range" id="fillOpacityInput" min="0" max="1" step="0.01" value="1" />
                            <label class="range-name-label">不透明度</label>
                            <input type="number" id="fillOpacityValueNumber" class="number-input" min="0" max="100" value="100" style="width: 60px; border-radius: 0 4px 4px 0" />
                        </div>
                    </div>
                    <div>
                        <h4>ストローク設定</h4>
                        <label>ストローク色 <input type="color" id="strokeColorInput" value="#000000" /></label>
                        <label
                            >線の太さ
                            <input type="number" id="strokeWidthInput" value="4" min="0" />
                            px</label
                        >
                        <div class="range-container">
                            <input type="range" id="strokeOpacityInput" min="0" max="1" step="0.01" value="1" />
                            <label class="range-name-label">不透明度</label>
                            <input type="number" id="strokeOpacityValueNumber" class="number-input" min="0" max="100" value="100" style="width: 60px; border-radius: 0 4px 4px 0" />
                        </div>
                    </div>
                </div>

                <div class="settings-group" id="imageSettings">
                    <h3>画像レイヤー設定</h3>
                    <label>背景画像 <input type="file" id="uploadImageInput" accept="image/*" /></label>
                </div>

                <div class="settings-group" id="downSettings">
                    <h3>ダウンロード設定</h3>
                    <input type="number" id="downloadResolutionInput" value="100" min="1" />
                    <button onclick="downloadImage()" class="never">ダウンロード</button>
                </div>
            </div>
        </div>

        <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="mainCanvas"></canvas>
        </div>

        <div id="layerSettings">
            <h3>レイヤー管理</h3>
            <label
                >合成モード
                <select id="globalCompositeOperationSelect"></select>
            </label>
            <div class="range-container">
                <input type="range" id="layerOpacityInput" min="0" max="1" step="0.01" value="1" />
                <label class="range-name-label">不透明度</label>
                <input type="number" id="layerOpacityValueNumber" class="number-input" min="0" max="100" value="100" style="width: 60px; border-radius: 0 4px 4px 0" />
            </div>
            <div class="layer-controls"></div>
            <div id="layerListContainer"></div>
        </div>

        <script>
            // --- DOM要素 ---
            const getEl = (id) => document.getElementById(id); // 簡略化関数

            const canvasWrapper = getEl("canvasWrapper");

            const toggleSettingsButton = getEl("toggleSettingsButton");
            const settingsPanel = document.querySelector(".section");

            // レイヤーパネル
            const layerListContainer = getEl("layerListContainer");
            const layerOpacityInput = getEl("layerOpacityInput");
            const layerOpacityValueNumber = getEl("layerOpacityValueNumber");
            const globalCompositeOperationSelect = getEl("globalCompositeOperationSelect");

            // モード設定パネル
            const canvasConfigSettingsPanel = getEl("canvasConfigSettings");
            const cellSettingsPanel = getEl("cellSettings");
            const lineSettingsPanel = getEl("lineSettings");
            const pathSettingsPanel = getEl("pathSettings");
            const textSettingsPanel = getEl("textSettings");
            const imageSettingsPanel = getEl("imageSettings");
            const downSettingsPanel = getEl("downSettings");

            const drowSettingsPanel = getEl("drowSettings");

            // キャンパス設定入力 (旧グリッド設定)
            const cellSizeInput = getEl("cellSizeInput");
            const colsInput = getEl("colsInput");
            const rowsInput = getEl("rowsInput");
            const gridLineWidthInput = getEl("gridLineWidthInput");
            // const gridColorInput = getEl("gridColorInput");
            const gridOpacityInput = getEl("gridOpacityInput");
            const gridOpacityValueNumber = getEl("gridOpacityValueNumber");
            const showCoordinatesCheckInput = getEl("showCoordinatesCheckInput");
            // const coordColorInput = getEl("coordColorInput");
            const coordFontSizeInput = getEl("coordFontSizeInput");
            const coordOpacityInput = getEl("coordOpacityInput");
            const coordOpacityValueNumber = getEl("coordOpacityValueNumber");
            const coordPositionSelect = getEl("coordPositionSelect");
            const solidBgColorInput = getEl("solidBgColorInput");
            const solidBgColorOpacityInput = getEl("solidBgColorOpacityInput");
            const solidBgColorOpacityValueNumber = getEl("solidBgColorOpacityValueNumber");

            // 共通フィル・ストローク設定入力
            const fillColorInput = getEl("fillColorInput");
            const fillOpacityInput = getEl("fillOpacityInput");
            const fillOpacityValueNumber = getEl("fillOpacityValueNumber");
            const strokeColorInput = getEl("strokeColorInput");
            const strokeWidthInput = getEl("strokeWidthInput");
            const strokeOpacityInput = getEl("strokeOpacityInput");
            const strokeOpacityValueNumber = getEl("strokeOpacityValueNumber");

            // 線モード入力
            const snapCheckLineInput = getEl("snapCheckLineInput");

            // パスモード入力
            const snapCheckPathInput = getEl("snapCheckPathInput");

            // テキストモード入力
            const fontSelect = getEl("fontSelect");
            const fontSizeInput = getEl("fontSizeInput");
            const textInput = getEl("textInput");

            // 画像モード入力
            const uploadImageInput = getEl("uploadImageInput");

            // ダウンロード設定入力
            const downloadResolutionInput = getEl("downloadResolutionInput");

            const pickrs = document.querySelectorAll(".color-picker");

            // --- 状態変数 ---
            let currentMode = "canvasConfig"; // 初期モード
            let currentTool = "pen"; // ペンモード時のツール

            // キャンパス設定
            let cellSize = parseInt(cellSizeInput.value);
            let cols = parseInt(colsInput.value);
            let rows = parseInt(rowsInput.value);
            let gridLineWidth = parseInt(gridLineWidthInput.value);
            // let gridColor = gridColorInput.value;
            let gridOpacity = parseFloat(gridOpacityInput.value);
            let showCoordinates = showCoordinatesCheckInput.checked;
            // let coordColor = "FFFFFF";
            let coordFontSize = parseInt(coordFontSizeInput.value);
            let coordOpacity = parseFloat(coordOpacityInput.value);
            let coordTextBaseline = coordPositionSelect.value;
            let currentSolidBgColor = solidBgColorInput.value; // 単色背景色
            let solidBgColorOpacity = parseFloat(solidBgColorOpacityInput.value); // 単色背景不透明度

            // 共通フィル・ストローク設定
            let currentFillColor = fillColorInput.value;
            let currentFillOpacity = parseFloat(fillOpacityInput.value);
            let currentStrokeColor = strokeColorInput.value;
            let currentStrokeWidth = parseInt(strokeWidthInput.value);
            let currentStrokeOpacity = parseFloat(strokeOpacityInput.value);

            // スナップ設定
            let snapLine = snapCheckLineInput.checked;
            let snapPath = snapCheckPathInput.checked;

            // テキスト設定
            let currentFont = fontSelect.value;
            let currentFontSize = parseInt(fontSizeInput.value);

            // レイヤーシステム
            let nextLayerId = 2;
            let activeLayerIds = [];
            let lastClickedLayerId = null;
            let draggedLayerId = null;

            // レイヤー設定リスナー
            layerOpacityInput.addEventListener("input", function () {

                this.style.background = `linear-gradient(90deg, ${activeColor} ${ratio}%, ${inactiveColor} ${ratio}%)`;
                activeLayerIds.forEach((fabricId) => {

            globalCompositeOperationSelect.addEventListener("change", (e) => {

                const vpt = canvas.viewportTransform;

            function initCanvasSize() {
                const width = canvasWrapper.clientWidth;
                const height = canvasWrapper.clientHeight;
                canvas.setWidth(width);
                canvas.setHeight(height);
            }

            function drawAll() {
                drawGridAndCoordinatesFabric();
            }

            function drawGridAndCoordinatesFabric() {
                const objects = canvas.getObjects();
                let gridGroup = null;
                let coordGroup = null;
                let gridGroupIndex = -1;
                let coordGroupIndex = -1;

                // 既存のグリッドと座標グループを効率的に見つけて削除
                for (let i = objects.length - 1; i >= 0; i--) {
                    const obj = objects[i];
                    if (obj.isGridGroup) {
                        gridGroup = obj;
                        gridGroupIndex = i;
                        canvas.remove(obj);
                    } else if (obj.isCoordGroup) {
                        coordGroup = obj;
                        coordGroupIndex = i;
                        canvas.remove(obj);
                    }
                    // 両方見つかったらループを抜ける
                    if (gridGroup && coordGroup) break;
                }

                const newGridObjects = [];
                const newCoordObjects = [];

                const canvasWidth = cols * cellSize;
                const canvasHeight = rows * cellSize;

                // グリッド線の生成を効率化
                for (let x = 0; x <= cols; x++) {
                    newGridObjects.push(
                        new fabric.Line([x * cellSize, 0, x * cellSize, canvasHeight], {
                            stroke: colors.gridColor,
                            strokeWidth: gridLineWidth,
                            originX: "center",
                            originY: "center",
                            selectable: false,
                            evented: false,
                        })
                    );
                }
                for (let y = 0; y <= rows; y++) {
                    newGridObjects.push(
                        new fabric.Line([0, y * cellSize, canvasWidth, y * cellSize], {
                            stroke: colors.gridColor,
                            strokeWidth: gridLineWidth,
                            originX: "center",
                            originY: "center",
                            selectable: false,
                            evented: false,
                        })
                    );
                }
                // 新しいグループを作成し、適切な位置に挿入または追加
                if (newGridObjects.length > 0) {
                    const newGridGroup = new fabric.Group(newGridObjects, {
                        id: 0,
                        isLayer: true,
                        name: "グリッド",
                        selectable: false,
                        evented: false,
                        isGridGroup: true,
                        objectCaching: false,
                    });
                    if (gridGroupIndex !== -1 && gridGroupIndex < canvas.getObjects().length) {
                        canvas.insertAt(gridGroupIndex, newGridGroup);
                    } else {
                        canvas.add(newGridGroup);
                    }
                }

                // 座標テキストの生成
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const centerX = c * cellSize + cellSize / 2;
                        const text = `${c}-${r}`;
                        let topOffset;

                        switch (coordTextBaseline) {
                            case "top":
                                topOffset = r * cellSize + coordFontSize / 2 + cellSize / 25;
                                break;
                            case "bottom":
                                topOffset = (r + 1) * cellSize - coordFontSize / 2 - cellSize / 50;
                                break;
                            default: // "center" もしくはその他の値
                                topOffset = r * cellSize + cellSize / 2;
                                break;
                        }

                        newCoordObjects.push(
                            new fabric.Text(text, {
                                left: centerX,
                                top: topOffset,
                                fill: colors.coordColor,
                                fontSize: coordFontSize,
                                fontFamily: "Arial",
                                textAlign: "center",
                                originX: "center",
                                originY: "center", // originYValueは常に"center"なので直接指定
                                selectable: false,
                                evented: false,
                            })
                        );
                    }
                }

                if (newCoordObjects.length > 0) {
                    const newCoordGroup = new fabric.Group(newCoordObjects, {
                        id: 1,
                        isLayer: true,
                        name: "座標",
                        selectable: false,
                        evented: false,
                        isCoordGroup: true,
                        objectCaching: false,
                    });
                    // 座標グループのインデックスはグリッドグループ削除後のインデックスを考慮する
                    if (coordGroupIndex !== -1 && coordGroupIndex < canvas.getObjects().length) {
                        canvas.insertAt(coordGroupIndex, newCoordGroup);
                    } else {
                        canvas.add(newCoordGroup);
                    }
                }

                renderLayerList();
                canvas.renderAll();
            }

            function drawPreview(points = [], mouseCoord = []) {
                const existingPreview = canvas.getObjects().find((obj) => obj.isPreview);
                if (existingPreview) canvas.remove(existingPreview);
                if (!points) return;
                if (points.length == 0) return;
                const rgb = hexToRgb(currentStrokeColor);
                const f_rgb = hexToRgb(currentFillColor);

                switch (currentMode) {
                    case "line": {
                        const previewObject = new fabric.Line([points.x, points.y, mouseCoord.x, mouseCoord.y], {
                            stroke: `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${currentStrokeOpacity * 0.5})`,
                            strokeWidth: currentStrokeWidth,
                            opacity: 1,
                            evented: false,
                            selectable: false,
                            isPreview: true,
                            objectCaching: false,
                        });
                        canvas.add(previewObject);
                        break;
                    }
                    case "path": {
                        const allPoints = [...points, mouseCoord];
                        const previewObject = new fabric.Polyline(allPoints, {
                            stroke: `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${currentStrokeOpacity * 0.5})`,
                            strokeWidth: currentStrokeWidth,
                            fill: `rgba(${f_rgb.r}, ${f_rgb.g}, ${f_rgb.b}, ${currentFillOpacity * 0.5})`,
                            opacity: 1,
                            evented: false,
                            selectable: false,
                            isPreview: true,
                            objectCaching: false,
                        });
                        canvas.add(previewObject);
                        break;
                    }
                }
                canvas.renderAll();
            }

            function drawSnapRect(mouseCoord, nearPoint) {
                const existingSnapRect = canvas.getObjects().find((obj) => obj.isSnapRect);
                if (existingSnapRect) canvas.remove(existingSnapRect);
                if (mouseCoord.x === nearPoint.x && mouseCoord.y === nearPoint.y) return;
                const currentZoom = canvas.getZoom();

                const rect = new fabric.Rect({
                    // left と top はオブジェクトの中心座標として設定するため、originX/Yを'center'にする
                    left: nearPoint.x,
                    top: nearPoint.y,
                    width: 15 / currentZoom,
                    height: 15 / currentZoom,
                    fill: "transparent", // 中は透明
                    stroke: "#40b7fc", // 線の色
                    strokeWidth: 1 / currentZoom, // 線の太さ
                    evented: false,
                    selectable: false,
                    isSnapRect: true,
                    objectCaching: false,
                    originX: "center", // 中心点を基準に配置
                    originY: "center",
                });

                canvas.add(rect);
            }

            // --- キャンパス＆キーボードリスナー ---
            canvas.on("mouse:down", function (opt) {
                var evt = opt.e;
                const mouseCoord = canvas.getPointer(opt.e);

                if (evt.altKey === true) {
                    this.isDragging = true;
                    this.selection = false;
                    this.lastPosX = evt.clientX;
                    this.lastPosY = evt.clientY;
                    return;
                }

                switch (currentMode) {
                    case "cell":
                        isDrawing = true;
                        // マス目座標を取得
                        const col = Math.floor(mouseCoord.x / cellSize);
                        const row = Math.floor(mouseCoord.y / cellSize);

                        const targetCellLayer = getCellLayer(); // 新規作成も含めて取得
                        if (targetCellLayer) {
                            canvas.setActiveObject(targetCellLayer);
                        }
                        if (!targetCellLayer) {
                            console.warn("ペンツール: アクティブなペンレイヤーがありません。");
                            isDrawing = false;
                            return;
                        }
                        // ペン描画開始 (マスク追加/削除)
                        handlePenDraw(Math.floor(col), Math.floor(row), targetCellLayer);
                        break;
                    case "line":
                        const newLinePoint = getNearestSnapCoord(mouseCoord);

                        if (!lineStartPoint) {
                            lineStartPoint = newLinePoint;
                            drawPreview(lineStartPoint, mouseCoord);
                        } else {
                            const lineEndPoint = newLinePoint;

                            const rgb = hexToRgb(currentStrokeColor);
                            const lineObject = new fabric.Line([lineStartPoint.x, lineStartPoint.y, lineEndPoint.x, lineEndPoint.y], {
                                stroke: `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${currentStrokeOpacity})`,
                                strokeWidth: currentStrokeWidth,
                                opacity: 1,
                                selectable: false,
                                evented: false,
                                objectCaching: false,
                            });

                            const existingPreview = canvas.getObjects().find((obj) => obj.isPreview);
                            if (existingPreview) canvas.remove(existingPreview);

                            addLayer("線", lineObject);
                            lineStartPoint = null;
                        }
                        break;
                    case "path":
                        const newPathPoint = getNearestSnapCoord(mouseCoord, pathPoints);
                        pathPoints.push(newPathPoint);
                        drawPreview(pathPoints, newPathPoint);
                        break;
                    case "text":
                        if (opt.target) {
                            opt.target.enterEditing();
                            canvas.renderAll();
                            return;
                        }
                        const s_rgb = hexToRgb(currentStrokeColor);
                        const f_rgb = hexToRgb(currentFillColor);
                        const newIText = new fabric.Textbox("", {
                            left: mouseCoord.x,
                            top: mouseCoord.y,
                            fontFamily: currentFont,
                            fontSize: currentFontSize,
                            stroke: `rgba(${s_rgb.r}, ${s_rgb.g}, ${s_rgb.b}, ${currentStrokeOpacity})`,
                            strokeWidth: currentStrokeWidth,
                            fill: `rgba(${f_rgb.r}, ${f_rgb.g}, ${f_rgb.b}, ${currentFillOpacity})`,
                            selectable: true,
                            editable: true,
                            evented: true,
                            hasControls: false,
                            objectCaching: false,
                            isTextbox: true,
                        });
                        addLayer("テキスト", newIText);
                        newIText.enterEditing();
                        newIText.selectAll();
                        canvas.renderAll();
                        break;
                }
                canvas.renderAll(); // 変更を反映
            });

            canvas.on("mouse:move", function (opt) {
                const mouseCoord = canvas.getPointer(opt.e);

                if (this.isDragging) {
                    var e = opt.e;
                    var vpt = this.viewportTransform;
                    vpt[4] += e.clientX - this.lastPosX;
                    vpt[5] += e.clientY - this.lastPosY;
                    this.requestRenderAll();
                    this.lastPosX = e.clientX;
                    this.lastPosY = e.clientY;
                }

                switch (currentMode) {
                    case "cell":
                        if (isDrawing) {
                            const col = Math.floor(mouseCoord.x / cellSize);
                            const row = Math.floor(mouseCoord.y / cellSize);
                            const activeCellLayer = getCellLayer();
                            handlePenDraw(Math.floor(col), Math.floor(row), activeCellLayer);
                        }
                        break;
                    case "line": {
                        const nearPoint = getNearestSnapCoord(mouseCoord);
                        drawPreview(lineStartPoint, nearPoint);
                        drawSnapRect(mouseCoord, nearPoint);
                        break;
                    }
                    case "path": {
                        const nearPoint = getNearestSnapCoord(mouseCoord, pathPoints);
                        drawPreview(pathPoints, nearPoint);
                        drawSnapRect(mouseCoord, nearPoint);
                        break;
                    }
                    case "text":
                        break;
                }
            });

            canvas.on("mouse:up", function (opt) {
                const mouseCoord = canvas.getPointer(opt.e);
                this.setViewportTransform(this.viewportTransform);
                this.isDragging = false;

                switch (currentMode) {
                    case "select":
                        this.selection = true;
                        break;
                    case "cell":
                        isDrawing = false;
                        break;
                    case "line":
                        break;
                    case "path":
                        break;
                    case "text":
                        break;
                }
            });

            canvas.on("mouse:wheel", function (opt) {
                var delta = opt.e.deltaY;
                var zoom = canvas.getZoom();
                zoom *= 0.999 ** delta;
                if (zoom > 20) zoom = 20;
                if (zoom < 0.01) zoom = 0.01;
                canvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom);
                opt.e.preventDefault();
                opt.e.stopPropagation();
            });

            canvas.on("text:editing:exited", function (opt) {
                const editedObject = opt.target;
                if (editedObject && editedObject.isTextbox) {
                    if (editedObject.text.trim() === "") {
                        canvas.remove(editedObject);
                        canvas.discardActiveObject();
                    }
                }
                canvas.renderAll();
            });

            canvas.on("selection:created", function (options) {
                renderLayerList();
                updateLayerListSelection();
            });

            canvas.on("selection:updated", function (opt) {
                renderLayerList();
                updateLayerListSelection();
            });

            canvas.on("selection:cleared", function () {
                renderLayerList();
                updateLayerListSelection();
            });

            document.addEventListener("keydown", function (event) {
                if (event.key === "Enter") {
                    switch (currentMode) {
                        case "cell":
                            break;
                        case "line": {
                            break;
                        }
                        case "path": {
                            if (pathPoints.length < 2) return;
                            const rgb = hexToRgb(currentStrokeColor);
                            const f_rgb = hexToRgb(currentFillColor);
                            const Polygon = new fabric.Polyline(pathPoints, {
                                stroke: `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${currentStrokeOpacity})`,
                                strokeWidth: currentStrokeWidth,
                                fill: `rgba(${f_rgb.r}, ${f_rgb.g}, ${f_rgb.b}, ${currentFillOpacity})`,
                                opacity: 1,
                                selectable: true,
                                evented: false,
                                hasControls: false,
                                objectCaching: false,
                            });
                            pathPoints = [];

                            const existingPreview = canvas.getObjects().find((obj) => obj.isPreview);
                            if (existingPreview) canvas.remove(existingPreview);
                            addLayer("多角形", Polygon);
                            break;
                        }
                        case "text":
                            break;
                    }
                } else if (event.key === "Delete" || event.key === "Backspace") {
                    const activeObjects = canvas.getActiveObjects();
                    activeObjects.forEach((obj) => {
                        canvas.remove(obj);
                    });
                    canvas.discardActiveObject();
                }
            });

            // --- モード設定関数 ---
            function setMode(newMode) {
                currentMode = newMode;
                pathPoints = [];
                lineStartPoint = null;
                const existingPreview = canvas.getObjects().find((obj) => obj.isPreview);
                if (existingPreview) canvas.remove(existingPreview);
                const existingSnapRect = canvas.getObjects().find((obj) => obj.isSnapRect);
                if (existingSnapRect) canvas.remove(existingSnapRect);

                const allModeButtons = document.querySelectorAll(".tub > button[id$='ModeButton']");
                allModeButtons.forEach((btn) => btn.classList.remove("active"));
                getEl(newMode + "ModeButton").classList.add("active");

                const allSettingsPanels = document.querySelectorAll(".settings, .settings-group");
                allSettingsPanels.forEach((panel) => (panel.style.display = "none"));

                canvas.forEachObject((obj) => {
                    if (obj.isLayer && !obj.isGridGroup && !obj.isCoordGroup) {
                        // グリッドオブジェクトは常に選択不可
                        obj.set({
                            selectable: false, // 選択不可
                            evented: false, // イベント対象外
                            hasControls: false, // 全モードでバウンディングボックスのコントロールを表示
                            hasBorders: true, // 全モードでバウンディングボックスのボーダーを表示
                        });
                    }
                });
                canvas.selection = newMode === "select";

                switch (newMode) {
                    case "canvasConfig":
                        canvasConfigSettingsPanel.style.display = "flex";
                        break;
                    case "select":
                        canvas.selection = true;
                        canvas.forEachObject((obj) => {
                            if (obj.isLayer && !obj.isGridGroup && !obj.isCoordGroup) {
                                obj.set({
                                    selectable: true,
                                    evented: true,
                                    hasControls: true,
                                    hasBorders: true,
                                });
                            }
                        });
                        drowSettingsPanel.style.display = "flex"; // 描画設定も表示？必要に応じて調整
                        break;
                    case "cell":
                        cellSettingsPanel.style.display = "flex";
                        drowSettingsPanel.style.display = "flex";
                        break;
                    case "line":
                        lineSettingsPanel.style.display = "flex";
                        drowSettingsPanel.style.display = "flex";
                        break;
                    case "path":
                        pathSettingsPanel.style.display = "flex";
                        drowSettingsPanel.style.display = "flex";
                        break;
                    case "text":
                        textSettingsPanel.style.display = "flex";
                        drowSettingsPanel.style.display = "flex";
                        canvas.forEachObject((obj) => {
                            if (obj.isTextbox) {
                                // グリッドオブジェクトは常に選択不可
                                obj.set({
                                    editable: true,
                                    selectable: true, // 選択不可
                                    evented: true, // イベント対象外
                                    hasControls: false, // 全モードでバウンディングボックスのコントロールを表示
                                    hasBorders: true, // 全モードでバウンディングボックスのボーダーを表示
                                });
                            }
                        });
                        break;
                    case "image":
                        imageSettingsPanel.style.display = "flex";
                        break;
                    case "down":
                        downSettingsPanel.style.display = "flex";
                        break;
                }
                if (settingsPanel.classList.contains("collapsed")) settingsPanel.classList.remove("collapsed");
                canvas.renderAll(); // 変更をレンダリング
            }

            function setTool(toolType) {
                currentTool = toolType;
                getEl("penToolButton").classList.toggle("nonactive", toolType !== "pen");
                getEl("eraserToolButton").classList.toggle("nonactive", toolType !== "eraser");
            }

            // --- レイヤー管理機能 ---
            function renderLayerList() {
                layerListContainer.innerHTML = ""; // 一度クリア
                const fabricObjects = canvas
                    .getObjects()
                    .filter((obj) => obj.isLayer)
                    .reverse();
                //for (let i = layers.length - 1; i >= 0; i--) {
                for (let i = 0; i < fabricObjects.length; i++) {
                    const fabricObject = fabricObjects[i];
                    const layerItem = document.createElement("div");

                    layerItem.classList.add("layer-item");
                    if (activeLayerIds.includes(fabricObject.id)) {
                        layerItem.classList.add("selected");
                    }
                    layerItem.dataset.layerId = fabricObject.id;
                    layerItem.draggable = true; // ドラッグ可能にする

                    // ドラッグイベントリスナーupdateLayerListSelection();
                    layerItem.addEventListener("dragstart", (e) => {
                        draggedLayerId = fabricObject.id;
                        e.dataTransfer.effectAllowed = "move";
                        e.target.style.opacity = "0.5"; // ドラッグ中の見た目
                    });

                    layerItem.addEventListener("dragover", (e) => {
                        e.preventDefault(); // ドロップを許可
                        e.dataTransfer.dropEffect = "move";
                        const rect = layerItem.getBoundingClientRect();
                        const isAfter = e.clientY > rect.top + rect.height / 2;
                        layerItem.classList.remove("drop-target-before", "drop-target-after");
                        if (isAfter) {
                            layerItem.classList.add("drop-target-after");
                        } else {
                            layerItem.classList.add("drop-target-before");
                        }
                    });

                    layerItem.addEventListener("dragleave", (e) => {
                        layerItem.classList.remove("drop-target-before", "drop-target-after");
                    });

                    layerItem.addEventListener("drop", (e) => {
                        e.preventDefault();
                        layerItem.classList.remove("drop-target-before", "drop-target-after");
                        e.target.style.opacity = "1";

                        if (draggedLayerId === null || draggedLayerId === fabricObject.id) {
                            draggedLayerId = null;
                            renderLayerList(); // 他のアイテムのスタイルを元に戻すため再描画
                            return;
                        }
                        const draggedObject = canvas.getObjects().find((obj) => obj.id === draggedLayerId);
                        const targetObject = canvas.getObjects().find((obj) => obj.id === fabricObject.id);

                        if (!draggedObject || !targetObject) {
                            draggedLayerId = null;
                            return;
                        }

                        const currentObjectsInOrder = canvas.getObjects().filter((obj) => obj.isLayer);
                        const draggedIndex = currentObjectsInOrder.indexOf(draggedObject);
                        let targetIndex = currentObjectsInOrder.indexOf(targetObject);

                        const rect = layerItem.getBoundingClientRect();
                        const isAfter = e.clientY > rect.top + rect.height / 2;

                        if (draggedIndex < targetIndex && isAfter) {
                            canvas.moveObjectTo(draggedObject, targetIndex - 1);
                        } else {
                            canvas.moveObjectTo(draggedObject, targetIndex);
                        }

                        draggedLayerId = null;
                        renderLayerList(); // UIを更新
                        canvas.renderAll(); // キャンバスを更新
                    });

                    layerItem.addEventListener("dragend", (e) => {
                        e.target.style.opacity = "1";
                        // 他のアイテムの drop-target クラスもクリア
                        document.querySelectorAll(".layer-item").forEach((item) => {
                            item.classList.remove("drop-target-before", "drop-target-after");
                        });
                        draggedLayerId = null; //念のため
                    });

                    // 表示/非表示トグル
                    const visibilityToggle = document.createElement("span");
                    visibilityToggle.classList.add("material-symbols-outlined", "layer-visibility-toggle");
                    visibilityToggle.textContent = fabricObject.visible ? "visibility" : "visibility_off";
                    visibilityToggle.title = fabricObject.visible ? "非表示にする" : "表示する";
                    visibilityToggle.addEventListener("click", (e) => {
                        e.stopPropagation();
                        toggleLayerVisibility(fabricObject.id);
                    });
                    layerItem.appendChild(visibilityToggle);

                    const layerNameSpan = document.createElement("span");
                    layerNameSpan.classList.add("layer-name");
                    layerNameSpan.textContent = fabricObject.name;
                    layerItem.appendChild(layerNameSpan);

                    layerItem.addEventListener("click", (e) => {
                        if (fabricObject.isGridGroup || fabricObject.isCoordGroup) return;
                        canvas.discardActiveObject();
                        layerId = fabricObject.id;
                        if (e.ctrlKey || e.metaKey) {
                            // Ctrl/Cmdキーが押されている場合
                            if (activeLayerIds.includes(layerId)) {
                                activeLayerIds = activeLayerIds.filter((id) => id !== layerId);
                            } else {
                                activeLayerIds.push(layerId);
                            }
                        } else if (e.shiftKey) {
                            // Shiftキーが押されている場合
                            if (lastClickedLayerId !== null) {
                                const allLayerIdsInDisplayOrder = canvas
                                    .getObjects()
                                    .filter((obj) => obj.isLayer && !obj.isGridGroup && !obj.isCoordGroup)
                                    .reverse()
                                    .map((obj) => obj.id);
                                const lastIndex = allLayerIdsInDisplayOrder.indexOf(lastClickedLayerId);
                                const currentIndex = allLayerIdsInDisplayOrder.indexOf(layerId);

                                if (lastIndex !== -1 && currentIndex !== -1) {
                                    const startIndex = Math.min(lastIndex, currentIndex);
                                    const endIndex = Math.max(lastIndex, currentIndex);
                                    const rangeSelection = allLayerIdsInDisplayOrder.slice(startIndex, endIndex + 1);
                                    activeLayerIds = [...new Set([...activeLayerIds, ...rangeSelection])];
                                }
                            } else {
                                activeLayerIds = [layerId];
                            }
                        } else {
                            activeLayerIds = [layerId];
                        }

                        const objectsToSelect = canvas.getObjects().filter((obj) => activeLayerIds.includes(obj.id));
                        if (objectsToSelect.length === 1) {
                            canvas.setActiveObject(objectsToSelect[0]);
                        } else {
                            const activeSelection = new fabric.ActiveSelection(objectsToSelect, { canvas: canvas });
                            canvas.setActiveObject(activeSelection);
                        }

                        lastClickedLayerId = layerId; // 最後にクリックされたレイヤーを更新
                        updateLayerListSelection();
                        canvas.renderAll();
                    });
                    layerListContainer.appendChild(layerItem);
                } //);
            }

            function toggleLayerVisibility(fabricId) {
                const fabricObject = canvas.getObjects().find((obj) => obj.id === fabricId);
                if (fabricObject) {
                    fabricObject.set({ visible: !fabricObject.visible });
                    renderLayerList(); // リスト表示を更新
                    canvas.renderAll();
                }
            }

            function updateLayerListSelection() {
                const activeObjects = canvas.getActiveObjects();
                const activeObjectIds = activeObjects.map((obj) => obj.id);
                document.querySelectorAll(".layer-item").forEach((item) => {
                    const layerId = parseInt(item.dataset.layerId);
                    if (activeObjectIds.includes(layerId)) {
                        item.classList.add("selected");
                    } else {
                        item.classList.remove("selected");
                    }
                });
            }

            function addLayer(type, fabricObject) {
                if (fabricObject) {
                    const newLayerId = nextLayerId++;

                    fabricObject.set({
                        id: newLayerId,
                        isLayer: true, // カスタムプロパティでレイヤーであることを示す
                        name: `${type}${canvas.getObjects().filter((obj) => obj.isLayer && obj.layerType === type).length + 1}`,
                        layerType: type, // レイヤーのタイプ（例: 'text', 'image', 'cell'）
                        visible: true,
                        opacity: 1,
                        globalCompositeOperation: "source-over",
                        borderColor: "#40b7fc",
                        cornerColor: "white",
                        cornerStrokeColor: "#40b7fc",
                        cornerSize: 12,
                        transparentCorners: false,
                        borderScaleFactor: 2,
                    });
                    if (type === "cell") {
                        fabricObject.cells = [];
                    }

                    canvas.add(fabricObject);

                    renderLayerList();
                    activeLayerIds = [newLayerId];
                    canvas.setActiveObject(fabricObject);
                    updateLayerListSelection();
                    canvas.renderAll();
                }
            }

            // --- セルモード専用関数 ---
            function getCellLayer(createIfNotFound = true) {
                let cellLayer = null;
                // canvasのオブジェクトからマス目レイヤーを探す
                const cellLayersInCanvas = canvas.getObjects().filter((obj) => obj.isCellGroup);
                const activeObjects = canvas.getActiveObjects();
                const activeObjectIds = activeObjects.map((obj) => obj.id);

                // 選択中のマス目レイヤーを探す
                if (activeObjectIds.length === 1) {
                    if (activeObjects[0].isCellGroup) {
                        cellLayer = activeObjects[0];
                    }
                }

                // 選択中のマス目レイヤーがなければ、最前面のマス目レイヤーを探す
                if (!cellLayer) {
                    for (let i = cellLayersInCanvas.length - 1; i >= 0; i--) {
                        cellLayer = cellLayersInCanvas[i];
                        break;
                    }
                }

                // それもなければ、新しくマス目レイヤーを作成
                if (!cellLayer && createIfNotFound) {
                    const newGroup = new fabric.Group([], {
                        height: rows * cellSize,
                        width: cols * cellSize,
                        selectable: false,
                        evented: false,
                        subTargetCheck: false,
                        hasControls: false,
                        hasBorders: true,
                        objectCaching: false,
                        isCellGroup: true, // マス目グループを識別するためのカスタムプロパティ
                        cells: [], // 新しいマス目レイヤーにもcellsプロパティを追加
                    });
                    addLayer("cell", newGroup);
                    // addLayerで追加されたオブジェクトはcanvas.getObjects()の末尾にあるはず
                    const addedFabricObject = canvas.getObjects()[canvas.getObjects().length - 1];
                    cellLayer = addedFabricObject;
                }
                return cellLayer;
            }

            // --- ヘルパー関数 ---
            function hexToRgb(hex) {
                const r = parseInt(hex.substring(1, 3), 16);
                const g = parseInt(hex.substring(3, 5), 16);
                const b = parseInt(hex.substring(5, 7), 16);
                return { r, g, b };
            }

            function getNearestSnapCoord(mouseCoords, existingPoints = [], baseSnapThresholdPx = 15) {
                const { x, y } = mouseCoords;

                const zoomRatio = canvas.getZoom();
                const currentSnapThreshold = baseSnapThresholdPx / zoomRatio;

                let closestSnapCoord = { x: x, y: y }; // スナップしない場合の初期値はマウス座標自体
                let minDistance = currentSnapThreshold + 1; // スナップしきい値より大きい値で初期化し、最初の候補がしきい値内であれば更新されるようにする

                // 候補点と距離の配列
                const snapCandidates = [];

                // 1. グリッド線上の点を候補に追加
                const gridX = Math.round(x / cellSize) * cellSize;
                const gridY = Math.round(y / cellSize) * cellSize;
                snapCandidates.push({ x: gridX, y: gridY });

                // 2. グリッドの半分の点を候補に追加
                const halfGridX = (Math.round((x / cellSize) * 2) * cellSize) / 2;
                const halfGridY = (Math.round((y / cellSize) * 2) * cellSize) / 2;
                snapCandidates.push({ x: halfGridX, y: halfGridY });

                // 3. 既存の点群を候補に追加
                snapCandidates.push(...existingPoints);

                // 全ての候補を評価し、最も近く、かつしきい値内の点を見つける
                for (const candidate of snapCandidates) {
                    const dist = Math.sqrt(Math.pow(x - candidate.x, 2) + Math.pow(y - candidate.y, 2));

                    // 距離が現在の最小距離より小さく、かつスナップしきい値以内である場合
                    if (dist < minDistance && dist <= currentSnapThreshold) {
                        minDistance = dist;
                        closestSnapCoord = candidate;
                    }
                }

                // スナップしきい値内に有効な候補が見つからなかった場合、元のマウス座標を返す
                // (minDistanceが初期値のまま、またはそれ以上の場合はスナップしなかったと判断)
                if (minDistance > currentSnapThreshold) {
                    return { x: x, y: y };
                }

                return closestSnapCoord;
            }

            function handleImageUpload(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function (event) {
                        const imageUrl = event.target.result;
                        fabric.Image.fromURL(
                            imageUrl,
                            function (img) {
                                img.set({
                                    left: 0, // 0,0 に配置
                                    top: 0, // 0,0 に配置
                                    originX: "left",
                                    originY: "top",
                                    selectable: true,
                                    evented: true,
                                    hasControls: true,
                                    hasBorders: true,
                                    objectCaching: false,
                                });
                                addLayer("画像", img);
                            },
                            { crossOrigin: "Anonymous" }
                        ); // CORS対応のため
                    };
                    reader.readAsDataURL(file);
                }
                uploadImageInput.value = "";
            }

            function downloadImage() {
                const resolution = parseFloat(downloadResolutionInput.value) / 100;
                const originalWidth = cols * cellSize;
                const originalHeight = rows * cellSize;
                const downloadWidth = originalWidth * resolution;
                const downloadHeight = originalHeight * resolution;

                // ダウンロード前に現在のズームとパンの状態を保存
                const originalVpt = canvas.viewportTransform;
                const originalZoom = canvas.getZoom();

                // ズームとパンをリセットして、キャンバス全体を元のサイズで表示
                canvas.setViewportTransform([1, 0, 0, 1, 0, 0]);
                canvas.setZoom(1);
                canvas.renderAll(); // 変更を適用

                const dataURL = canvas.toDataURL({
                    format: "png",
                    multiplier: resolution,
                    left: 0,
                    top: 0,
                    width: originalWidth,
                    height: originalHeight,
                });

                const tempCanvas = document.createElement("canvas");
                tempCanvas.width = downloadWidth;
                tempCanvas.height = downloadHeight;
                const tempCtx = tempCanvas.getContext("2d");

                const img = new Image();
                img.onload = function () {
                    tempCtx.drawImage(img, 0, 0, downloadWidth, downloadHeight);

                    // ダウンロードリンクを作成
                    const a = document.createElement("a");
                    a.href = tempCanvas.toDataURL("image/png");
                    a.download = "canvas_image.png";
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);

                    canvas.setViewportTransform(originalVpt);
                    canvas.setZoom(originalZoom);
                    canvas.renderAll();
                };
                img.src = dataURL;
            }

            function handlePenDraw(col, row, targetCellLayer) {
                if (!targetCellLayer || targetCellLayer.layerType !== "cell") return;
                if (!targetCellLayer.cells) targetCellLayer.cells = [];

                const existingMaskIndex = targetCellLayer.cells.findIndex((m) => m.col === col && m.row === row);
                const f_rgb = hexToRgb(currentFillColor);

                if (currentTool === "pen") {
                    if (existingMaskIndex !== -1) {
                        targetCellLayer.cells[existingMaskIndex] = {
                            col: col,
                            row: row,
                            color: `rgba(${f_rgb.r}, ${f_rgb.g}, ${f_rgb.b}, ${currentFillOpacity})`,
                        };
                    } else {
                        targetCellLayer.cells.push({
                            col: col,
                            row: row,
                            color: `rgba(${f_rgb.r}, ${f_rgb.g}, ${f_rgb.b}, ${currentFillOpacity})`,
                        });
                    }
                } else if (currentTool === "eraser") {
                    if (existingMaskIndex !== -1) {
                        targetCellLayer.cells.splice(existingMaskIndex, 1);
                    }
                }
                updateCellLayerFabricObject(targetCellLayer);
            }

            function updateCellLayerFabricObject(layer) {
                if (layer.layerType !== "cell") return;

                const currentObjects = layer.getObjects();
                const objectsToRemove = [];
                const objectsToAdd = [];

                const existingCellMap = new Map(); // 現在のFabricオブジェクトのマス目を追跡
                currentObjects.forEach((obj) => {
                    if (obj.cellKey) {
                        existingCellMap.set(obj.cellKey, obj);
                    }
                });

                // layer.cells から Fabric オブジェクトを生成または更新
                layer.cells.forEach((cellData) => {
                    const cellKey = `${cellData.col},${cellData.row}`;
                    const existingRect = existingCellMap.get(cellKey);

                    if (existingRect) {
                        // 既存の四角形があれば更新
                        existingRect.set({
                            fill: cellData.color,
                            stroke: "",
                            strokeWidth: 0,
                        });
                        existingCellMap.delete(cellKey); // 処理済みとしてマップから削除
                    } else {
                        // なければ新しい四角形を作成
                        const rect = new fabric.Rect({
                            left: (cellData.col - cols / 2) * cellSize,
                            top: (cellData.row - rows / 2) * cellSize,
                            originX: "left",
                            originY: "top",
                            width: cellSize,
                            height: cellSize,
                            fill: cellData.color,
                            stroke: "",
                            strokeWidth: 0,
                            selectable: false,
                            evented: false,
                            objectCaching: false,
                            cellKey: cellKey, // マス目のキーをカスタムプロパティとして追加
                        });
                        objectsToAdd.push(rect);
                    }
                });

                // existingCellMapに残っているオブジェクトは、cellsデータから削除されたものなので削除
                existingCellMap.forEach((obj) => {
                    objectsToRemove.push(obj);
                });

                if (objectsToRemove.length > 0) {
                    layer.remove(...objectsToRemove);
                }
                if (objectsToAdd.length > 0) {
                    layer.add(...objectsToAdd);
                }
                drawAll();
            }
        </script>
