<!DOCTYPE html>
<html>
    <head>
        <title>Fabric.js ベジェ曲線サンプル</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
        <style>
            body {
                margin: 0;
                overflow: hidden;
            }
            canvas {
                border: 1px solid #ccc;
            }
        </style>
    </head>
    <body>
        <canvas id="bezierCanvas" width="800" height="600"></canvas>

        <script>
            const canvas = new fabric.Canvas("bezierCanvas");
            let points = []; // クリックされた点を格納
            let bezierPath = null; // ベジェ曲線のパスオブジェクト
            let circles = []; // クリック点を表示する円を格納

            // クリックイベントリスナー
            canvas.on("mouse:down", function (options) {
                const pointer = canvas.getPointer(options.e);
                const x = pointer.x;
                const y = pointer.y;

                // クリックした点を表示
                const circle = new fabric.Circle({
                    radius: 5,
                    fill: "red",
                    left: x,
                    top: y,
                    selectable: false,
                    evented: false,
                    originX: "center",
                    originY: "center",
                });
                canvas.add(circle);
                circles.push(circle); // 円を配列に格納
                points.push({ x: x, y: y });

                // 2点以上あればベジェ曲線を描画
                if (points.length >= 2) {
                    drawBezierCurve();
                }
            });

            function drawBezierCurve() {
                // 既存のベジェ曲線があれば削除
                if (bezierPath) {
                    canvas.remove(bezierPath);
                }

                if (points.length < 2) return;

                let pathString = "";

                // 最初の点のMコマンド
                // 曲線は最初の点から始まる
                pathString += "M " + points[0].x + " " + points[0].y;

                if (points.length < 3) {
                    pathString += "L " + points[1].x + " " + points[1].y;
                } else {
                    for (let i = 1; i < points.length - 1; i++) {
                        const p1 = points[i]; // 現在の点 (制御点)
                        const p2 = points[i + 1]; // 次の点

                        // 最初と2番目の点の間、および最後から2番目と最後の点の間は中間点なし
                        if (i === points.length - 2) {
                            // 最後から2番目の点から最後の点へのセグメント
                            // 最後から2番目の点を制御点、最後の点を終点とする
                            pathString += ` Q ${p1.x} ${p1.y}, ${p2.x} ${p2.y}`;
                        } else {
                            // それ以外の通常の中間セグメント
                            // 中間点を計算し、現在の点を制御点、中間点を終点とする
                            const midX = (p1.x + p2.x) / 2;
                            const midY = (p1.y + p2.y) / 2;
                            pathString += ` Q ${p1.x} ${p1.y}, ${midX} ${midY}`;
                        }
                    }
                }

                // 2点目から最後までループ

                // Pathオブジェクトの作成
                bezierPath = new fabric.Path(pathString, {
                    stroke: "blue",
                    strokeWidth: 2,
                    fill: "",
                    selectable: false,
                    evented: false,
                });
                canvas.add(bezierPath);
                canvas.renderAll();
            }

            // リセットボタン (オプション)
            const resetButton = document.createElement("button");
            resetButton.textContent = "リセット";
            resetButton.style.position = "absolute";
            resetButton.style.top = "10px";
            resetButton.style.left = "10px";
            document.body.appendChild(resetButton);

            resetButton.addEventListener("click", function () {
                canvas.clear();
                points = [];
                circles = [];
                bezierPath = null;
            });
        </script>
    </body>
</html>
